server {
    listen 80;
    server_name _;

    # Uploads de vídeo podem ser grandes (admin) — alinhado ao limite do backend.
    client_max_body_size 4096m;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: rotas do React Router caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy da API e do streaming para o backend Spring Boot
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming HLS: repassa Range e não bufferiza respostas grandes
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # Cache de assets estáticos versionados pelo Vite
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/locflix}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: WARN
    com.locflix: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.springframework.data: WARN
  file:
    name: logs/locflix.log
    max-size: 10MB
    max-history: 30

springdoc:
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

info:
  app:
    name: LOCFLIX
    description: Plataforma de locacao de filmes
    version: 1.0.0

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}


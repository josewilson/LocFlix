spring:
  application:
    name: locflix
  profiles:
    active: ${SPRING_PROFILE:dev}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  servlet:
    multipart:
      max-file-size: 4096MB
      max-request-size: 4096MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false

logging:
  level:
    root: INFO
    com.locflix: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.flywaydb: INFO

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-your-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}

locflix:
  storage:
    videos-path: ${LOCFLIX_VIDEOS_PATH:./storage/videos}

movie:
  external:
    omdb:
      api-key: ${OMDB_API_KEY:}
      base-url: ${OMDB_BASE_URL:https://www.omdbapi.com/}

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

info:
  app:
    name: LOCFLIX
    description: Plataforma de locacao de filmes
    version: 1.0.0

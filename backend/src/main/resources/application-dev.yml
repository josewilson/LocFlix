spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/locadora
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

logging:
  level:
    root: INFO
    com.locflix: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data: DEBUG
    org.flywaydb: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  swagger-ui:
    enabled: true

jwt:
  secret: ${JWT_SECRET:dev-secret-key-insecure-change-immediately-dev-secret-key-insecure-change-immediately}
  expiration: ${JWT_EXPIRATION:86400000}

